# =========================================================================
# Apache snippet — Sistema Solar Interactivo bajo demo.estratekdata.com/planets
# =========================================================================
#
# Contexto: este Alias se añade DENTRO del vhost existente
# `demo.estratekdata.com` (puerto 443). NO crear un nuevo vhost.
#
# Ubicación esperada en el servidor etk-web:
#   /opt/estratek/planets/   <-- clone del repo (contenido estático)
#
# Antes de aplicar:
#   1. Hacer backup del vhost actual:
#        sudo cp /etc/apache2/sites-available/demo.estratekdata.com-le-ssl.conf \
#                /etc/apache2/sites-available/demo.estratekdata.com-le-ssl.conf.bak.$(date +%Y%m%d)
#   2. Validar sintaxis:  sudo apache2ctl configtest
#   3. Reload:            sudo systemctl reload apache2
#
# No tocar rutas existentes ni otros vhosts.
# =========================================================================

# ---- Insertar dentro del <VirtualHost *:443> de demo.estratekdata.com ----

    Alias /planets/ /opt/estratek/planets/
    Alias /planets  /opt/estratek/planets/

    <Directory /opt/estratek/planets/>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        DirectoryIndex index.html

        # Cache agresiva para assets estáticos
        <FilesMatch "\.(svg|png|jpg|jpeg|gif|webp|ico)$">
            Header set Cache-Control "public, max-age=2592000, immutable"
        </FilesMatch>
        <FilesMatch "\.(js|css)$">
            Header set Cache-Control "public, max-age=604800"
        </FilesMatch>
        <FilesMatch "\.html$">
            Header set Cache-Control "no-cache, must-revalidate"
        </FilesMatch>

        # Seguridad básica
        Header set X-Content-Type-Options "nosniff"
        Header set Referrer-Policy "strict-origin-when-cross-origin"
        Header set Permissions-Policy "geolocation=(), microphone=(), camera=()"

        # CORS para texturas servidas desde nuestro dominio (no necesario para CDN)
        # Header set Access-Control-Allow-Origin "*"
    </Directory>

    # Redirigir /planets a /planets/ para evitar problemas de rutas relativas
    RedirectMatch permanent ^/planets$ /planets/

# ---- Fin del snippet ----
